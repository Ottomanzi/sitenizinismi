<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* Navbar */

header{
background:#000;
padding:15px 30px;
font-size:26px;
font-weight:bold;
color:red;
}

/* Upload */

.upload{
padding:20px;
background:#181818;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,button{
padding:10px;
border:none;
border-radius:6px;
}

input{
background:#222;
color:white;
}

button{
background:red;
color:white;
cursor:pointer;
}

/* Video grid */

#videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#181818;
padding:10px;
border-radius:10px;
}

video{
width:100%;
border-radius:8px;
}

.title{
margin:10px 0;
font-size:18px;
}

</style>

</head>

<body>

<header>TRTube</header>

<div class="upload">

<input type="text" id="title" placeholder="Video başlığı">

<input type="file" id="videoFile" accept="video/*">

<button onclick="uploadVideo()">Video Yükle</button>

</div>

<div id="videos"></div>

<script>

function uploadVideo(){

let title = document.getElementById("title").value
let file = document.getElementById("videoFile").files[0]

if(!title || !file){
alert("Video ve başlık ekle")
return
}

let url = URL.createObjectURL(file)

let container = document.getElementById("videos")

let card = document.createElement("div")
card.className="card"

card.innerHTML = `
<div class="title">${title}</div>
<video controls src="${url}"></video>
`

container.appendChild(card)

}

</script>

</body>
</html>
